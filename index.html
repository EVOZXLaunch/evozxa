<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EVOZXA</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
</head>
<body>
    <canvas id="cyberParticles"></canvas>
    <div class="container">
        <header>
            <h1>EVOZXA FUTURE</h1>
            <button id="btnConnect" class="btn">Connect Wallet</button>
        </header>

        <div class="slider-wrapper">
            <div class="slider-track" id="sliderTrack">
                <div class="slide"><h3>1. Token Core Info</h3><input type="text" id="tokenName" placeholder="Name"><input type="text" id="tokenSymbol" placeholder="Symbol"></div>
                <div class="slide"><h3>2. Tokenomics</h3><input type="number" id="tokenSupply" value="1000000"></div>
                <div class="slide"><h3>3. Security</h3><label><input type="checkbox" id="featMintable"> Mintable</label><label><input type="checkbox" id="featBurnable"> Burnable</label></div>
            </div>
            <div class="slider-nav">
                <button onclick="changeSlide(-1)">Prev</button>
                <button onclick="changeSlide(1)">Next</button>
            </div>
        </div>
        
        <div class="dashboard">
            <h3>Deployment Fee: <span id="txtLiveFee">0</span> EVOZX</h3>
            <button id="btnExecuteDeploy" class="btn" disabled>LAUNCH TOKEN</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
