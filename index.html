<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVOZXA FUTURE</title>
    <link rel="stylesheet" href="./css/app.css">
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>
</head>
<body>

<div class="saas-container">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <div class="brand-header" style="text-align: left; margin: 0;">
            <img src="./images/logo.png" class="platform-logo" alt="EVOZXA" style="width: 40px; margin-bottom: 0;">
        </div>
        <button id="connectBtn" class="premium-btn" style="width: auto; padding: 10px 20px; font-size: 0.8rem;">Connect Wallet</button>
    </header>

    <div class="brand-header">
        <h2>EVOZXA FUTURE</h2>
        <p>Professional Token Deployment</p>
    </div>

    <div id="walletInfo" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px;">
        <div class="price-panel" style="padding: 10px; text-align: center;">
            <span style="display:block; font-size: 0.7rem; color: var(--text-muted);">Wallet</span>
            <strong id="walletAddress" style="font-size: 0.8rem; word-break: break-all;">---</strong>
        </div>
        <div class="price-panel" style="padding: 10px; text-align: center;">
            <span style="display:block; font-size: 0.7rem; color: var(--text-muted);">EVOZ</span>
            <strong id="evozBalance" style="font-size: 0.8rem;">0.00</strong>
        </div>
        <div class="price-panel" style="padding: 10px; text-align: center;">
            <span style="display:block; font-size: 0.7rem; color: var(--text-muted);">EVOZX</span>
            <strong id="evozxBalance" style="font-size: 0.8rem;">0.00</strong>
        </div>
    </div>

    <form id="tokenForm">
        <div class="input-group"><label>Token Name</label><input id="name" type="text" placeholder="Name"></div>
        <div class="input-group"><label>Symbol</label><input id="symbol" type="text" placeholder="Symbol"></div>
        <div class="input-group"><label>Total Supply</label><input id="supply" type="number" placeholder="Supply"></div>

        <div class="accordion-container">
            <div class="accordion-item">
                <div class="accordion-header">Features <span class="arrow-icon">▶</span></div>
                <div class="accordion-content">
                    <label class="checkbox-group"><input type="checkbox" id="burnable" class="feature-checkbox"> <span>Burnable</span></label>
                    <label class="checkbox-group"><input type="checkbox" id="mintable" class="feature-checkbox"> <span>Mintable</span></label>
                    <label class="checkbox-group"><input type="checkbox" id="ownership" class="feature-checkbox"> <span>Ownership</span></label>
                    <label class="checkbox-group"><input type="checkbox" id="maxWallet" class="feature-checkbox"> <span>Max Wallet</span></label>
                    <label class="checkbox-group"><input type="checkbox" id="maxTx" class="feature-checkbox"> <span>Max TX</span></label>
                    <label class="checkbox-group"><input type="checkbox" id="tradingControl" class="feature-checkbox"> <span>Trading Control</span></label>
                    <label class="checkbox-group"><input type="checkbox" id="buyTax" class="feature-checkbox"> <span>Buy Tax</span></label>
                    <label class="checkbox-group"><input type="checkbox" id="sellTax" class="feature-checkbox"> <span>Sell Tax</span></label>
                    <label class="checkbox-group"><input type="checkbox" id="website" class="feature-checkbox"> <span>Website</span></label>
                    <label class="checkbox-group"><input type="checkbox" id="telegram" class="feature-checkbox"> <span>Telegram</span></label>
                    <label class="checkbox-group"><input type="checkbox" id="twitter" class="feature-checkbox"> <span>Twitter</span></label>
                    <label class="checkbox-group"><input type="checkbox" id="logo" class="feature-checkbox"> <span>Logo</span></label>
                </div>
            </div>

            <div class="accordion-item">
                <div class="accordion-header">Metadata <span class="arrow-icon">▶</span></div>
                <div class="accordion-content">
                    <input id="websiteUrl" type="text" placeholder="Website URL">
                    <input id="telegramUrl" type="text" placeholder="Telegram URL">
                    <input id="twitterUrl" type="text" placeholder="Twitter URL">
                    <input id="logoUrl" type="text" placeholder="Logo URL">
                </div>
            </div>

            <div class="accordion-item">
                <div class="accordion-header">Advanced Settings <span class="arrow-icon">▶</span></div>
                <div class="accordion-content">
                    <input id="buyTaxValue" type="number" placeholder="Buy Tax %">
                    <input id="sellTaxValue" type="number" placeholder="Sell Tax %">
                    <input id="maxWalletValue" type="number" placeholder="Max Wallet %">
                    <input id="maxTxValue" type="number" placeholder="Max TX %">
                    <input id="burnTaxShare" type="number" placeholder="Burn Tax %">
                    <input id="marketingWallet" type="text" placeholder="Marketing Wallet">
                    <input id="developmentWallet" type="text" placeholder="Development Wallet">
                </div>
            </div>
        </div>
    </form>

    <div class="price-panel">
        <div class="price-row"><span>EVOZX Fee</span> <span class="price-glowing" id="evozxFee">10</span></div>
        <div class="price-row"><span>EVOZ Value</span> <span class="price-glowing" id="evozFee">50</span></div>
    </div>

    <button id="deployBtn" class="premium-btn">Deploy Token</button>
</div>

<script>
    document.querySelectorAll('.accordion-header').forEach(h => h.addEventListener('click', () => h.parentElement.classList.toggle('active')));
</script>
<script type="module" src="./js/app.js"></script>
<script type="module" src="./js/main.js"></script>
</body>
                    </html>
